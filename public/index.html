<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Express Backend</title>
    <link rel="stylesheet" href="css/stayle.css">

</head>
<body>

    <div class="weather-container">
        <div class="header">
            <span class="icon">☁️☀️</span>
            <h1>Weather App</h1>
        </div>

        <div class="input-section">
            <input type="text" id="country-input" placeholder="Enter country name">
            <button id="get-weather-btn">Get Weather</button>
        </div>

        <!-- المربعات الزجاجية التي تظهر فيها البيانات بعد الضغط على الزر -->
        <div class="results-section" id="results-section" style="display: none;">
            <div class="data-box">
                <span class="box-icon">📍</span>
                <p id="country-text">Country: </p>
            </div>
            <div class="data-box">
                <span class="box-icon">🌐</span>
                <p id="lat-text">Latitude: </p>
            </div>
            <div class="data-box">
                <span class="box-icon">🌐</span>
                <p id="lon-text">Longitude: </p>
            </div>
            <div class="data-box">
                <span class="box-icon">☀️</span>
                <p id="temp-text">Temperature: </p>
            </div>
        </div>
    </div>
    <script  src="JavaScript/script.js"></script>
</body>
</html>
